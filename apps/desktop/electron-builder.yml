appId: se.innoveramera.cmdrzone
productName: CmdrZone
# pnpm hoists electron to the workspace root, so electron-builder can't auto-detect the
# version — state it explicitly (keep in sync with the electron devDependency).
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
# Use our pre-built native modules (pnpm rebuild:native against Electron's ABI).
# electron-builder's own rebuild misbehaves under pnpm's hoisted monorepo layout.
npmRebuild: false
files:
  - out/**
  - package.json
# Ship the changelog into the app bundle so the renderer can show "What's New" at runtime
# (read from process.resourcesPath in production; from the repo root in dev).
extraResources:
  - from: ../../CHANGELOG.md
    to: CHANGELOG.md
asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/node-pty/**'
# electron-updater reads GitHub Releases; release assets are published by the Release workflow.
publish:
  provider: github
  owner: Innoveramera
  repo: cmdrzone
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # electron-updater needs a zip for macOS in-place updates (the dmg is for first install).
  target:
    - dmg
    - zip
  # Ad-hoc signing for local builds. For distribution, set identity to your Apple
  # Developer ID and provide notarization credentials (APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID).
  identity: null
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  title: ${productName}
